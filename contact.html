<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ziad IK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --bg-color: #080808; 
            --text-color: #ffffff; 
            --accent-color: #00f2ff; 
            --glass: rgba(255, 255, 255, 0.03); 
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        .light-mode {
            --bg-color: #f4f4f4;
            --text-color: #080808;
            --accent-color: #0077ff;
            --glass: rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Space Grotesk', sans-serif; 
            transition: 0.5s;
            overflow-x: hidden;
        }

        .nav-bubble { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(128,128,128,0.2); border-radius: 50px; }
        
        .contact-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(128,128,128,0.2);
            padding: 1.2rem;
            border-radius: 12px;
            color: var(--text-color);
            outline: none;
            transition: 0.3s;
        }
        .contact-input:focus { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }

        #whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25D366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .theme-switch {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .theme-switch:hover { background: var(--accent-color); color: #000; }
    </style>
</head>
<body>

    <a href="https://wa.me/201016430939" target="_blank" id="whatsapp-btn" class="hover:scale-110">
        <svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.435 5.621 1.436h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>

    <nav class="fixed top-8 left-0 w-full z-50 flex justify-center px-6">
        <div class="nav-bubble px-6 py-3 flex items-center gap-6 md:gap-10">
            <div class="font-bold text-lg tracking-tighter">ZIAD IK</div>
            <div class="hidden md:flex gap-8 text-[10px] uppercase tracking-[0.3em] font-bold opacity-70">
                <a href="index.html" class="hover:text-cyan-400">Home</a>
                <a href="projects.html" class="hover:text-cyan-400">Portfolio</a>
                <a href="about.html" class="hover:text-cyan-400">About</a>
                <a href="contact.html" class="text-cyan-400">Contact</a>
            </div>
            <div id="theme-toggle" class="theme-switch">
                <span id="theme-icon">☀️</span>
            </div>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6 md:px-20 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20">
        
        <div class="reveal">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-8 italic">GET IN <br> TOUCH.</h1>
            <p class="text-lg opacity-60 mb-12 max-w-sm">Have a project in mind or just want to say hi? Feel free to reach out via any platform.</p>
            
            <div class="space-y-8">
                <div>
                    <h4 class="text-[10px] uppercase tracking-widest opacity-40 mb-2">Socials</h4>
                    <div class="flex gap-6">
                        <a href="https://github.com/Ziad-Osama-Ik" target="_blank" class="hover:text-cyan-400 font-bold underline">GitHub</a>
                        <a href="https://www.linkedin.com/in/ziad-osama-372082397" target="_blank" class="hover:text-cyan-400 font-bold underline">LinkedIn</a>
                        <a href="https://wa.me/201016430939" target="_blank" class="hover:text-cyan-400 font-bold underline">WhatsApp</a>
                    </div>
                </div>
                <div>
                    <h4 class="text-[10px] uppercase tracking-widest opacity-40 mb-2">Email</h4>
                    <p class="text-xl font-bold">zezoosama129@gmail.com</p>
                </div>
            </div>
        </div>

        <div class="reveal">
            <form id="contact-form" action="https://formspree.io/f/zezoosama129@gmail.com" method="POST" class="space-y-6">
                <div>
                    <input type="text" name="name" placeholder="YOUR NAME" class="contact-input" required>
                </div>
                <div>
                    <input type="email" name="_replyto" placeholder="YOUR EMAIL" class="contact-input" required>
                </div>
                <div>
                    <textarea name="message" rows="5" placeholder="YOUR MESSAGE" class="contact-input" required></textarea>
                </div>
                <button type="submit" class="w-full py-5 bg-white text-black font-bold uppercase tracking-widest hover:bg-cyan-400 transition-colors">
                    Send Message
                </button>
            </form>
            <div id="status" class="mt-4 text-sm font-bold text-cyan-400 hidden text-center">Message sent successfully!</div>
        </div>

    </main>

    <script>
        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeIcon.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
        });

        // Form Submission Logic
        const form = document.getElementById("contact-form");
        const status = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const response = await fetch(form.action, {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                status.classList.remove("hidden");
                form.reset();
                setTimeout(() => status.classList.add("hidden"), 5000);
            } else {
                alert("Oops! There was a problem submitting your form");
            }
        });

        // GSAP
        gsap.from(".reveal", { opacity: 0, y: 30, duration: 1, stagger: 0.2, ease: "power3.out" });
    </script>
</body>
</html>
